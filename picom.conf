backend = "xrender";
vsync = false;
use-damage = true;

fading = true;
fade-in-step = 0.04;
fade-out-step = 0.04;
fade-delta = 5;

inactive-opacity = 0.92;
active-opacity = 1.0;
frame-opacity = 0.9;

opacity-rule = [
  "88:class_g = 'kitty'",
  "95:class_g = 'Thunar'",
  "100:fullscreen"
];

corner-radius = 8;
rounded-corners-exclude = [
  "window_type = 'dock'",
  "window_type = 'desktop'",
  "class_g = 'xfce4-panel'"
];

shadow = false;

wintypes: {
  tooltip       = { fade = true; shadow = false; opacity = 0.95; focus = true; };
  dock          = { shadow = false; };
  dnd           = { shadow = false; };
  popup_menu    = { opacity = 0.95; shadow = false; };
  dropdown_menu = { opacity = 0.95; shadow = false; };
};