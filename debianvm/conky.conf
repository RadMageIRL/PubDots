conky.config = {
    alignment = 'top_left',
    gap_x = 10,
    gap_y = 10,
    minimum_width = 240,

    own_window = true,
    own_window_type = 'normal',
    own_window_transparent = false,
    own_window_argb_visual = true,
    own_window_argb_value = 217,
    own_window_hints = 'undecorated,below,sticky,skip_taskbar,skip_pager',

    double_buffer = true,
    use_xft = true,
    font = 'JetBrainsMono Nerd Font Mono:size=10',
    xftalpha = 1,
    update_interval = 1.0,
    no_buffers = true,

    -- THE POP: dark shadow behind every glyph
    draw_shades = true,
    default_shade_color = '000000',
    draw_outline = false,

    -- brighter, higher-contrast phosphor palette
    default_color = 'EAFBF0',    -- near-white, was soft grey-green
    color1 = '5DFF9F',           -- brighter phosphor green (headers/bars)
    color2 = 'FFD24B',           -- brighter amber (values)
    color3 = 'A8C4B5',           -- lighter dim (labels) — was too dark
}

conky.text = [[
${color1}${font JetBrainsMono Nerd Font Mono:bold:size=14}󰣇 ${nodename}${font}${color}
${color1}${hr 2}${color}
${color3} distro  ${color}Debian ${execi 3600 cat /etc/debian_version}
${color3} kernel  ${color}${kernel}
${color3} uptime  ${color2}${uptime_short}${color}

${color1} CPU${color}  ${color3}${execi 3600 grep -m1 'model name' /proc/cpuinfo | cut -d: -f2 | sed 's/^ //;s/ [0-9].*//'}${color}
${color3}    ${color2}${cpu cpu0}%${color}  ${freq_g}GHz
${color1}${cpubar cpu0 8,220}${color}

${color1} MEM${color}  ${color2}${mem}${color3} / ${memmax}${color}
${color1}${membar 8,220}${color}

${color1}󰋊 DISK${color} ${color2}${fs_used /}${color3} / ${fs_size /}${color}
${color1}${fs_bar 8,220 /}${color}

${color3}󰛳 net ens33${color}
${color3}   ${color2}${downspeed ens33}${color3}   ${color2}${upspeed ens33}${color}
]]
